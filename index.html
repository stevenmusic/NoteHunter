<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音符獵人 - 和風錄</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-window">
        <header class="global-header">
            <div class="header-top-row">
                <span class="player-name-badge">修行者</span>
                <span id="levelDisplay" class="lv-badge">Lv.1</span>
                <span class="gold-badge">金 <span id="goldDisplay">0</span></span>
            </div>
            <div class="exp-bar-container">
                <div class="exp-bar-fill"></div>
            </div>
        </header>

        <div class="global-monster-wrapper">
            <div class="monster-slime">
                <div class="slime-face">
                    <div class="slime-eye left"></div>
                    <div class="slime-eye right"></div>
                    <div class="slime-mouth normal"></div>
                </div>
            </div>
            <div class="global-monster-info">
                <span class="monster-name">迷途小鬼</span>
                <div class="hp-bar-container">
                    <div class="hp-bar-fill" style="width: 100%;"></div>
                    <span class="hp-bar-text">100 / 100</span>
                </div>
            </div>
        </div>

        <div class="page-container">
            <div id="combatPage" class="page active">
                <div class="section-card">
                    <div class="staff-wrapper">
                        </div>
                </div>
                <div class="answer-keyboard" id="keyboard">
                    </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-menu">
                <button class="nav-btn active" data-page="combatPage">退魔</button>
                <button class="nav-btn" data-page="shopPage">商店</button>
            </div>
        </nav>
    </div>

    <script src="game.js"></script>
</body>
</html>
