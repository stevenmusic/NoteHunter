<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音符獵人 - 和風錄</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header class="header">
            <div class="status-top">
                <span>修行者</span>
                <span id="levelDisplay">Lv.1</span>
                <span>金：<span id="goldDisplay">0</span></span>
            </div>
            <div class="hp-bar-container">
                <div class="monster-name">迷途小鬼</div>
                <div class="hp-bg">
                    <div class="hp-fill" id="hpFill" style="width: 100%;"></div>
                </div>
                <div class="hp-text" id="hpText">100 / 100</div>
            </div>
        </header>

        <main class="main-content">
            <div class="slime-container" id="slime">
                <div class="slime-body"></div>
                <div class="slime-eye"></div>
            </div>
        </main>

        <nav class="nav-bar">
            <button class="nav-btn">退魔</button>
            <button class="nav-btn">商店</button>
        </nav>
    </div>

    <script src="game.js"></script>
</body>
</html>
