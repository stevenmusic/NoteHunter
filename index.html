<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteHunter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HUD -->
  <div class="topHUD">
    <div class="nameRow">
      👤 Steven
      <span class="level" id="levelText">Lv.1</span>
    </div>

    <div class="expBar">
      <div class="expFill" id="expFill"></div>
    </div>

    <div class="expText" id="expText">EXP 0 / 100</div>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- HOME -->
    <div id="homePage" class="page active">
      <h2>🏠 首頁</h2>
      <p>歡迎來到 NoteHunter</p>
    </div>

    <!-- CHARACTER -->
    <div id="characterPage" class="page">
      <h2>👤 人物</h2>

      <div id="stats"></div>

      <h3>⚔️ 武器</h3>
      <div id="weapon"></div>

      <h3>🥋 衣服</h3>
      <div id="armor"></div>

      <h3>🛡️ 盾牌</h3>
      <div id="shield"></div>
    </div>

    <!-- PLAY -->
    <div id="playPage" class="page">
      <h2>🎮 遊玩</h2>

      <button onclick="startGame()">高音譜號</button>
      <button onclick="startGame()">低音譜號</button>
      <button onclick="startGame()">混合模式</button>
    </div>

    <!-- RANK -->
    <div id="rankPage" class="page">
      <h2>🏆 排行榜</h2>
      <p>尚未開放</p>
    </div>

    <!-- SETTINGS -->
    <div id="settingPage" class="page">
      <h2>⚙️ 設定</h2>
      <p>尚未開放</p>
    </div>

    <!-- GAME -->
    <div id="gamePage" class="page">

      <div id="note">C4</div>

      <div class="btnGrid">
        <button onclick="answer('C')">C</button>
        <button onclick="answer('D')">D</button>
        <button onclick="answer('E')">E</button>
        <button onclick="answer('F')">F</button>
        <button onclick="answer('G')">G</button>
        <button onclick="answer('A')">A</button>
        <button onclick="answer('B')">B</button>
      </div>

      <div class="info">
        <div id="score">Score 0</div>
        <div id="combo">Combo 0</div>
      </div>

      <button onclick="backHome()">返回</button>

    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottomNav">
    <button onclick="switchPage('characterPage')">人物</button>
    <button onclick="switchPage('playPage')">遊玩</button>
    <button onclick="switchPage('rankPage')">排行</button>
    <button onclick="switchPage('settingPage')">設定</button>
  </div>

</div>

<script src="data.js"></script>
<script src="game.js"></script>

</body>
</html>
