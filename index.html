<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>音符獵人 Note Hunter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 頂部通用金幣欄 -->
  <div class="global-header">
    <div id="levelText" class="lv-badge">Lv.1</div>
    <div id="goldDisplay" class="gold-badge">💰 0</div>
  </div>

  <!-- ==================== 主頁基地 ==================== -->
  <div id="homePage" class="page active">
    <div class="lobby-container">
      <h2>⚔️ 基地掛機中 ⚔️</h2>
      
      <!-- 史萊姆展示區（置中不重疊） -->
      <div class="battle-box">
        <div id="monsterName" class="monster-name">Lv.1 史萊姆</div>
        <div class="hp-bar-container">
          <div id="monsterHpFill" class="hp-bar-fill"></div>
          <div id="monsterHpText" class="hp-bar-text">HP: 50 / 50</div>
        </div>
        <div class="monster-wrapper">
          <div id="homeMonster" class="monster-slime">
            <div class="slime-face">
              <div class="slime-eye left"></div>
              <div class="slime-eye right"></div>
              <div class="slime-mouth"></div>
            </div>
          </div>
          <div id="homeHitEffect" class="hit-effect">💥</div>
        </div>
      </div>

      <!-- 模式選擇 -->
      <div class="menu-box">
        <h3>🎵 進入戰鬥闖關</h3>
        <button class="btn btn-blue" onclick="startGame('treble')">高音譜模式</button>
        <button class="btn btn-blue" onclick="startGame('bass')">低音譜模式</button>
        
        <h3>✏️ 讀音純練習 (不扣血)</h3>
        <button class="btn btn-purple" onclick="startGame('treble_practice')">高音譜練習</button>
        <button class="btn btn-purple" onclick="startGame('bass_practice')">低音譜練習</button>
      </div>

      <!-- 導覽底欄 -->
      <div class="nav-bar">
        <button class="nav-btn active">首頁</button>
        <button class="nav-btn" onclick="switchPage('characterPage')">英雄裝備</button>
      </div>
    </div>
  </div>

  <!-- ==================== 遊戲戰鬥頁 ==================== -->
  <div id="gamePage" class="page">
    <div class="game-container">
      <div class="game-header">
        <span id="score">Score: 0</span>
        <span id="combo">Combo: 0</span>
        <button class="btn-back" onclick="backHome()">✕ 離開</button>
      </div>

      <!-- 戰鬥區史萊姆（置中不重疊） -->
      <div class="battle-box" id="monsterBattleBox">
        <div class="monster-wrapper">
          <div id="gameMonster" class="monster-slime">
            <div class="slime-face">
              <div class="slime-eye left"></div>
              <div class="slime-eye right"></div>
              <div class="slime-mouth"></div>
            </div>
          </div>
          <div id="gameHitEffect" class="hit-effect">💥</div>
        </div>
      </div>

      <!-- 五線譜顯示區 -->
      <div class="staff-wrapper">
        <div class="staff-lines"><div></div><div></div><div></div><div></div><div></div></div>
        <div id="staffClef"></div>
        <div id="noteNote"></div>
      </div>

      <!-- 答題按鈕 -->
      <div class="answer-keyboard">
        <button class="key-btn" onclick="answer('C')">C</button>
        <button class="key-btn" onclick="answer('D')">D</button>
        <button class="key-btn" onclick="answer('E')">E</button>
        <button class="key-btn" onclick="answer('F')">F</button>
        <button class="key-btn" onclick="answer('G')">G</button>
        <button class="key-btn" onclick="answer('A')">A</button>
        <button class="key-btn" onclick="answer('B')">B</button>
      </div>
    </div>
  </div>

  <!-- ==================== 角色裝備頁 ==================== -->
  <div id="characterPage" class="page">
    <div class="character-container">
      <h2>👤 英雄狀態與裝備</h2>
      
      <!-- 經驗值條 -->
      <div class="exp-bar-container">
        <div id="expFill" class="exp-bar-fill"></div>
        <div id="expText" class="exp-bar-text">EXP 0 / 100</div>
      </div>

      <!-- 總屬性面板 -->
      <div id="stats"></div>

      <!-- 裝備卡片容器 -->
      <div class="equipment-list">
        <div id="weapon"></div>
        <div id="armor"></div>
        <div id="shield"></div>
      </div>

      <!-- 導覽底欄 -->
      <div class="nav-bar">
        <button class="nav-btn" onclick="switchPage('homePage')">首頁</button>
        <button class="nav-btn active">英雄裝備</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
