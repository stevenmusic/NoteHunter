<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NoteHunter - Real Note Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="gameApp">
  <div class="global-header">
    <div class="nameRow">
      <span>⚔️ Steven</span>
      <span class="level" id="levelText">Lv.1</span>
    </div>
    <div onclick="switchPage('settingPage')" style="cursor:pointer; font-size: 20px;">⚙️</div>
  </div>
  <div class="exp-container">
    <div class="exp-fill" id="expFill"></div>
    <div class="exp-text" id="expText">EXP 0 / 100</div>
  </div>

  <div id="content">
    <div id="homePage" class="page active">
      <h2>🏠 首頁基地</h2>
      <div class="menu-box"><p>點擊「遊玩」開啟音符斬殺冒險！</p></div>
    </div>
    <div id="characterPage" class="page">
      <h2>👤 英雄狀態</h2>
      <div id="stats" class="stat-container"></div>
      <div class="gear-section">
        <h3>⚔️ 武器庫</h3><div id="weapon" class="item-card"></div>
        <h3>🥋 戰甲</h3><div id="armor" class="item-card"></div>
        <h3>🛡️ 神盾</h3><div id="shield" class="item-card"></div>
      </div>
    </div>
    <div id="shopPage" class="page">
      <h2>🛒 鐵匠鋪</h2>
      <div class="shop-grid" id="shopList"></div>
    </div>
    <div id="playPage" class="page">
      <h2>🎮 選擇戰役</h2>
      <button onclick="startGame('treble')">高音譜號模式</button>
      <button onclick="startGame('bass')">低音譜號模式</button>
    </div>
    <div id="settingPage" class="page">
      <h2>⚙️ 設定</h2>
      <p style="text-align:center;">特效優化中...</p>
    </div>
    <div id="gamePage" class="page">
      <div class="note-container"><div id="staffClef"></div><div id="noteNote"></div></div>
      <div class="btnGrid">
        <button onclick="answer('C')">C</button><button onclick="answer('D')">D</button>
        <button onclick="answer('E')">E</button><button onclick="answer('F')">F</button>
      </div>
      <div class="info"><div id="score">Score: 0</div></div>
      <button onclick="backHome()">撤退</button>
    </div>
  </div>

  <div class="bottomNav">
    <button onclick="switchPage('homePage')">🏠</button>
    <button onclick="switchPage('characterPage')">👤</button>
    <button onclick="switchPage('shopPage')">🛒</button>
    <button onclick="switchPage('playPage')">🎮</button>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
