<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音符獵人：譜畫神兵</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="gameApp">
    <div class="global-header">
      <div id="levelText">Lv.1</div>
      <div id="goldDisplay">💰 50</div>
    </div>

    <div class="exp-container">
      <div id="expFill" class="exp-fill"></div>
      <div id="expText" class="exp-text">EXP 0 / 100</div>
    </div>

    <div id="content">
      
      <div id="homePage" class="page active">
        <h1>🎵 音符獵人</h1>
        <p class="subtitle">擊碎音符，鍛造傳奇裝備</p>
        <div class="menu-box">
          <button onclick="startGame('treble')">🎼 高音譜號模式</button>
          <button onclick="startGame('bass')">𝄢 低音譜號模式</button>
          <button onclick="startGame('mix')">⚡ 混合雙譜號挑戰</button>
        </div>
      </div>

      <div id="gamePage" class="page">
        <div class="game-status">
          <span id="score">Score: 0</span>
          <span id="combo">Combo: 0</span>
        </div>

        <div class="note-container">
          <div class="staff-line" style="top: 50px;"></div>
          <div class="staff-line" style="top: 70px;"></div>
          <div class="staff-line" style="top: 90px;"></div>
          <div class="staff-line" style="top: 110px;"></div>
          <div class="staff-line" style="top: 130px;"></div>
          
          <div id="staffClef"></div>
          <div id="noteNote" class="note-target"></div>
        </div>

        <div class="keyboard">
          <button onclick="answer('C')">C</button>
          <button onclick="answer('D')">D</button>
          <button onclick="answer('E')">E</button>
          <button onclick="answer('F')">F</button>
          <button onclick="answer('G')">G</button>
          <button onclick="answer('A')">A</button>
          <button onclick="answer('B')">B</button>
        </div>

        <button class="exit-btn" onclick="backHome()">放棄撤退</button>
      </div>

      <div id="characterPage" class="page">
        <h2>⚔️ 冒險者面板</h2>
        
        <div id="stats" class="stats-box"></div>
        
        <h3>🛡️ 當前穿戴裝備</h3>
        <div class="equip-slots">
          <div id="weapon" class="item-card"></div>
          <div id="armor" class="item-card"></div>
          <div id="shield" class="item-card"></div>
        </div>

        <button onclick="backHome()">返回主畫面</button>
      </div>

      <div id="shopPage" class="page">
        <h2>🛒 皇家裝備商店</h2>
        <div class="shop-header">
          <span>資產：</span>
          <span id="shopGoldDisplay" style="color:#ffcc00; font-weight:bold; font-size:18px;">💰 50</span>
        </div>
        
        <div id="shopContent" class="shop-grid"></div>

        <button onclick="backHome()">返回主畫面</button>
      </div>

    </div>

    <div class="bottomNav">
      <button onclick="switchPage('homePage')">🏠 首頁</button>
      <button onclick="switchPage('characterPage')">⚔️ 人物</button>
      <button onclick="switchPage('shopPage')">🛒 商店</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
