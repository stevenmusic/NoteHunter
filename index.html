<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NoteHunter - 樂譜冒險</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

  <div class="topHUD">
    <div class="nameRow">
      <span>⚔️ Steven</span>
      <span class="level" id="levelText">Lv.1</span>
    </div>
    <div class="expBar">
      <div class="expFill" id="expFill"></div>
    </div>
    <div class="infoRow" style="display:flex;justify-content:space-between;margin-top:5px;font-size:13px;">
      <span id="expText">EXP 0 / 100</span>
      <span id="goldDisplay" style="color:#ffb300;font-weight:bold;">💰 0</span>
    </div>
  </div>

  <div id="content">

    <div id="homePage" class="page active">
      <h2>🏠 首頁基地</h2>
      
      <div class="menu-box" id="monsterBattleBox">
        <div class="monster-vertical-container">
          <div id="monsterName">Lv.1 史萊姆</div>
          
          <div class="monster-hp-bar">
            <div id="monsterHpFill" style="width:100%;"></div>
            <span id="monsterHpText">HP: 50 / 50</span>
          </div>
          
          <div class="monster-wrapper">
            <div id="homeMonster" class="monster-slime">
              <div class="monster-eye left"></div>
              <div class="monster-eye right"></div>
              <div class="monster-mouth"></div>
            </div>
            <div id="homeHitEffect" class="hit-effect">💥</div>
          </div>
        </div>
      </div>
    </div>

    <div id="characterPage" class="page">
      <h2>👤 英雄狀態</h2>
      
      <div class="stat-container">
        <div class="stat-line">⚔️ 攻擊力 (ATK): <span id="statAtk" style="font-weight:bold;color:#ff2a6d;">10</span></div>
        <div class="stat-line">⚡ 爆擊率 (Crit): <span id="statCrit" style="font-weight:bold;color:#00b4db;">5%</span></div>
      </div>
      
      <div class="gear-section">
        <h3>⚔️ 武器庫</h3>
        <div id="weapon" class="item-card rarity-common">
          <div class="gear-info">
            <div class="gear-title">新手長劍 <span id="weaponLevelText" style="color:#ffaa00;">(Lv.1)</span></div>
            <div class="gear-desc">每級提升 5 點攻擊力</div>
          </div>
          <button class="upgrade-btn" onclick="upgradeGear('weapon')">升級 (<span id="weaponCost">30</span> 金幣)</button>
        </div>
        
        <h3>🛡️ 神盾</h3>
        <div id="shield" class="item-card rarity-common">
          <div class="gear-info">
            <div class="gear-title">木製圓盾 <span id="shieldLevelText" style="color:#ffaa00;">(Lv.1)</span></div>
            <div class="gear-desc">每級提升 3% 爆擊率</div>
          </div>
          <button class="upgrade-btn" onclick="upgradeGear('shield')">升級 (<span id="shieldCost">30</span> 金幣)</button>
        </div>
      </div>
    </div>

    <div id="playPage" class="page">
      <h2>🎮 選擇戰役模式</h2>
      
      <div class="mode-section">
        <h4 style="margin: 5px 0; color: #52526e;">🎵 讀音基礎練習</h4>
        <button onclick="startGame('treble_practice')">高音譜號練習 (C4 - C6)</button>
        <button onclick="startGame('bass_practice')">低音譜號練習 (C2 - C4)</button>
      </div>
      
      <hr style="border: 0; border-top: 1px dashed #ccc; margin: 15px 0;">
      
      <div class="mode-section">
        <h4 style="margin: 5px 0; color: #52526e;">⚔️ 討伐挑戰模式</h4>
        <button onclick="startGame('treble')">高音譜號戰役 (C4 - C6)</button>
        <button onclick="startGame('bass')">低音譜號戰役 (C2 - C4)</button>
        <button onclick="startGame('mix')">混合譜號戰役 (全範圍)</button>
      </div>
    </div>

    <div id="rankPage" class="page">
      <h2>🏆 諸神排行榜</h2>
      <p class="menu-box" style="text-align:center;color:#8a8a9e;">全球聯賽計算中，請先提升戰力...</p>
    </div>

    <div id="settingPage" class="page">
      <h2>⚙️ 冒險設定</h2>
      <p class="menu-box" style="text-align:center;color:#8a8a9e;">打擊音效與畫面粒子特效優化中</p>
    </div>

    <div id="gamePage" class="page">
      
      <div class="monster-vertical-container game-battle-zone">
        <div id="gameMonsterName" style="font-weight:bold; font-size:16px;">Lv.1 史萊姆</div>
        <div class="monster-hp-bar">
          <div id="gameMonsterHpFill" style="width:100%; background:linear-gradient(90deg, #ff416c, #ff4b2b);"></div>
          <span id="gameMonsterHpText">HP: 50 / 50</span>
        </div>
        <div class="monster-wrapper">
          <div id="gameMonster" class="monster-slime">
            <div class="monster-eye left"></div>
            <div class="monster-eye right"></div>
            <div class="monster-mouth"></div>
          </div>
          <div id="gameHitEffect" class="hit-effect">💥</div>
        </div>
      </div>

      <div class="note-container">
        <div class="staff-line" style="top:130px;"></div>
        <div class="staff-line" style="top:110px;"></div>
        <div class="staff-line" style="top: 90px;"></div>
        <div class="staff-line" style="top: 70px;"></div>
        <div class="staff-line" style="top: 50px;"></div>
        <div id="staffClef"></div>
        <div id="noteNote"></div>
      </div>

      <div class="btnGrid">
        <button onclick="answer('C')">C</button>
        <button onclick="answer('D')">D</button>
        <button onclick="answer('E')">E</button>
        <button onclick="answer('F')">F</button>
        <button onclick="answer('G')">G</button>
        <button onclick="answer('A')">A</button>
        <button onclick="answer('B')">B</button>
      </div>

      <div class="info">
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
      </div>
      <button onclick="backHome()" style="margin-top:25px;background:linear-gradient(180deg,#555 0%,#333 100%);border-color:#666;border-bottom-color:#111;color:#ddd;">撤退回基地</button>
    </div>

  </div>

  <div class="bottomNav">
    <button onclick="switchPage('homePage')">🏠 基地</button> 
    <button onclick="switchPage('characterPage')">👤 人物</button>
    <button onclick="switchPage('playPage')">🎮 遊玩</button>
    <button onclick="switchPage('rankPage')">🏆 排行</button>
    <button onclick="switchPage('settingPage')">⚙️ 設定</button>
  </div>

</div>
<script src="game.js"></script>
</body>
</html>
