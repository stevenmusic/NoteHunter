<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>音符獵人：百鬼刃與盾</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    
    <header class="global-header">
      <div class="player-stats">
        <div class="user-info">
          <span id="playerName">⚔️ 武者</span>
          <span id="levelText" class="lv-badge">Lv.1</span>
        </div>
        <div id="goldDisplay" class="gold-badge">🪙 0</div>
      </div>

      <div class="global-monster-wrapper" id="globalMonsterWrapper">
        <div id="globalMonster" class="monster-slime">
          <div class="slime-body">
             <div class="slime-face">
                <div class="slime-eye left"></div>
                <div class="slime-eye right"></div>
                <div class="slime-mouth"></div>
             </div>
          </div>
          <div id="globalSlashEffect" class="slash-effect"></div>
        </div>
      </div>

      <div class="monster-hp-container">
        <div id="globalMonsterName">糰子暮泥</div>
        <div class="hp-bar-outer">
          <div id="globalMonsterHpFill" class="hp-bar-inner"></div>
        </div>
      </div>
    </header>

    <main class="page-container">
      
      <section id="homePage" class="page active">
        <div class="menu-card">
          <h2>🏮 驅魔結界</h2>
          <button class="btn-primary" onclick="startGame('treble')">🎵 高音譜 · 斬妖卷</button>
          <button class="btn-secondary" onclick="startGame('bass')">🎵 低音譜 · 鎮魔卷</button>
        </div>
      </section>

      <section id="gamePage" class="page">
        <div class="game-ui-card">
          <div class="game-stats-bar">
            <span id="score">🏆 戰功: 0</span>
            <span id="combo">🔥 0</span>
          </div>
          <div class="staff-wrapper">
            <div id="noteNote" class="note-display">🎵</div>
          </div>
          <div class="answer-keyboard">
            </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="switchPage('homePage')">🏠 首頁</button>
      <button class="nav-btn" onclick="switchPage('characterPage')">⚔️ 裝備</button>
    </nav>
  </div>
  <script src="game.js"></script>
</body>
</html>
