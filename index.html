<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NoteHunter - Real Note Edition</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

  <!-- HUD -->
  <div class="topHUD">
    <div class="nameRow">
      <span>⚔️ Steven</span>
      <span class="level" id="levelText">Lv.1</span>
      <button onclick="switchPage('settingPage')" class="setting-btn">⚙️</button>
    </div>

    <div class="expBar">
      <div class="expFill" id="expFill"></div>
    </div>

    <div class="infoRow">
      <span id="expText">EXP 0 / 100</span>
      <span id="goldDisplay">💰 0</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <div id="homePage" class="page active">
      <h2>🏠 首頁基地</h2>
      <div class="menu-box">歡迎來到 NoteHunter</div>
    </div>

    <div id="characterPage" class="page">
      <h2>👤 英雄狀態</h2>
      <div id="stats" class="stat-container"></div>

      <div class="gear-section">
        <h3>⚔️ 武器</h3>
        <div id="weapon" class="item-card"></div>

        <h3>🥋 戰甲</h3>
        <div id="armor" class="item-card"></div>

        <h3>🛡️ 神盾</h3>
        <div id="shield" class="item-card"></div>
      </div>
    </div>

    <div id="playPage" class="page">
      <h2>🎮 選擇模式</h2>

      <button onclick="startGame('treble')">高音模式</button>
      <button onclick="startGame('bass')">低音模式</button>
      <button onclick="startGame('mix')">混合模式</button>
    </div>

    <div id="rankPage" class="page">
      <h2>🏆 排行榜</h2>
      <div class="menu-box">開發中</div>
    </div>

    <div id="shopPage" class="page">
      <h2>🛒 商店</h2>
      <div class="shop-grid" id="shopGrid"></div>
    </div>

    <div id="settingPage" class="page">
      <h2>⚙️ 設定</h2>
      <div class="menu-box">系統設定</div>
    </div>

    <!-- GAME -->
    <div id="gamePage" class="page game-page">

      <div class="note-container">

        <div class="staff">
          <div class="staff-line" style="top:130px;"></div>
          <div class="staff-line" style="top:110px;"></div>
          <div class="staff-line" style="top:90px;"></div>
          <div class="staff-line" style="top:70px;"></div>
          <div class="staff-line" style="top:50px;"></div>
        </div>

        <div id="staffClef"></div>
        <div id="noteNote"></div>

      </div>

      <div class="btnGrid">
        <button onclick="answer('C')">C</button>
        <button onclick="answer('D')">D</button>
        <button onclick="answer('E')">E</button>
        <button onclick="answer('F')">F</button>
        <button onclick="answer('G')">G</button>
        <button onclick="answer('A')">A</button>
        <button onclick="answer('B')">B</button>
      </div>

      <div class="info">
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
      </div>

      <button onclick="backHome()" class="exit-btn">回基地</button>

    </div>

  </div>

  <!-- NAV -->
  <div class="bottomNav">
    <button onclick="switchPage('characterPage')">👤</button>
    <button onclick="switchPage('playPage')">🎮</button>
    <button onclick="switchPage('rankPage')">🏆</button>
    <button onclick="switchPage('shopPage')">🛒</button>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
